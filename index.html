<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Coaching – Wiegand &amp; Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-dark:#3C3489;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#085041;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-dark:#633806;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --red:#E24B4A;--red-bg:#FCEBEB;
  --r-sm:6px;--r-md:8px;--r-lg:12px;
  --sidebar:240px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;display:flex;}
/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.sb-header{padding:18px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.sb-dot{width:8px;height:8px;border-radius:50%;background:var(--purple);}
.sb-title{font-size:14px;font-weight:600;}
.sb-sub{font-size:11px;color:var(--text2);padding-left:16px;}
.sb-nav{padding:8px 0 4px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-left:3px solid transparent;transition:all .12s;}
.sb-item:hover{background:var(--bg2);color:var(--text);}
.sb-item.active{background:var(--bg2);color:var(--purple);border-left-color:var(--purple);}
.sb-item i{font-size:16px;}
.sb-divider{height:1px;background:var(--border);margin:4px 0;}
.sb-section{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 16px 4px;}
.emp-list{flex:1;overflow-y:auto;}
.emp-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.emp-item:hover{background:var(--bg2);}
.emp-item.active{background:var(--bg2);border-left-color:var(--purple);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.emp-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.emp-role{font-size:11px;color:var(--text2);}
.emp-badge{font-size:10px;font-weight:600;padding:2px 6px;border-radius:20px;flex-shrink:0;margin-left:auto;}
.sb-add{margin:6px 12px 10px;padding:7px 12px;border:1px dashed var(--border2);border-radius:var(--r-md);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s;width:calc(100% - 24px);font-family:inherit;}
.sb-add:hover{color:var(--text);border-color:var(--purple);}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-left{display:flex;align-items:center;gap:14px;}
.tb-name{font-size:16px;font-weight:600;}
.tb-meta{font-size:12px;color:var(--text2);margin-top:1px;}
.btn{padding:7px 13px;font-size:13px;font-weight:500;border-radius:var(--r-md);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);display:flex;align-items:center;gap:6px;transition:all .12s;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-primary:hover{background:var(--purple-dark);}
.btn-sm{padding:5px 10px;font-size:12px;}
.btn-danger{background:var(--red-bg);color:var(--red);border-color:var(--red);}
/* TABS */
.tab-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;flex-shrink:0;}
.tab{padding:10px 15px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .12s;white-space:nowrap;}
.tab.active{color:var(--purple);border-bottom-color:var(--purple);}
.tab:hover:not(.active){color:var(--text);}
/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px 24px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
/* CARDS */
.card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 17px;margin-bottom:14px;}
.card-title{font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.sec-title{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px;}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
/* KPI GRIDS */
.g5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px;}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:14px;}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 15px;border-top:3px solid transparent;}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:600;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
/* FORMS */
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
.f5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:10px;}
input,select,textarea{font-size:13px;padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;width:100%;outline:none;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--purple);}
textarea{resize:vertical;min-height:75px;line-height:1.5;}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px;}
/* TABLES */
.tbl{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--bg2);padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
/* ALERTS */
.alert{border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;}
.alert-warn{background:var(--amber-bg);border:1px solid rgba(186,117,23,.2);}
.alert-danger{background:var(--red-bg);border:1px solid rgba(226,75,74,.2);}
.alert-ok{background:var(--teal-bg);border:1px solid rgba(29,158,117,.2);}
/* PROTOCOLS */
.proto{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 17px;margin-bottom:10px;}
.proto-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;gap:10px;}
.proto-meta{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);flex-wrap:wrap;}
.crit-tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
/* SKILLS */
.skill-row{display:flex;align-items:center;gap:10px;margin-bottom:9px;}
.skill-label{font-size:13px;color:var(--text2);width:170px;flex-shrink:0;}
.skill-track{flex:1;height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;}
.skill-fill{height:100%;border-radius:3px;}
.skill-pct{font-size:12px;color:var(--text2);width:34px;text-align:right;}
.skill-delta{font-size:11px;width:38px;text-align:right;}
/* SESS HIST */
.sess-hist{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);overflow:hidden;margin-bottom:14px;}
.sess-row{display:flex;align-items:center;gap:10px;padding:11px 15px;border-bottom:1px solid var(--border);}
.sess-row:last-child{border-bottom:none;}
/* ONBOARDING */
.ob-day-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border-radius:var(--r-md);margin-bottom:8px;margin-top:14px;}
.ob-day-label{font-size:13px;font-weight:600;color:var(--purple);flex:1;}
.ob-step{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);margin-bottom:8px;overflow:hidden;}
.ob-hdr{display:flex;align-items:center;gap:11px;padding:12px 14px;cursor:pointer;}
.ob-hdr:hover{background:var(--bg2);}
.ob-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;}
.ob-check.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.ob-label{font-size:13px;font-weight:500;flex:1;}
.ob-status{font-size:11px;color:var(--text3);}
.ob-chev{font-size:14px;color:var(--text3);transition:transform .2s;}
.ob-chev.open{transform:rotate(180deg);}
.ob-detail{display:none;border-top:1px solid var(--border);background:var(--bg2);padding:12px 14px 14px 47px;}
.ob-detail.open{display:block;}
.ob-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:12px;}
.ob-video-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;}
.ob-video-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;}
.ftp-badge{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:500;padding:2px 7px;border-radius:20px;background:var(--teal-bg);color:var(--teal-dark);}
/* SOLIDROAD */
.sr-sim{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;}
.sr-ring{width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;border:3px solid;}
.sr-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.sr-tag{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--bg2);color:var(--text2);}
/* TASKS */
.task-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);margin-bottom:8px;overflow:hidden;}
.task-item.overdue{border-left:3px solid var(--red);}
.task-item.done-item{opacity:.6;}
.task-row{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;cursor:pointer;}
.task-check{width:22px;height:22px;border-radius:50%;border:2px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all .15s;margin-top:1px;}
.task-check.done{background:var(--teal);border-color:var(--teal);color:#fff;}
.task-title{font-size:13px;font-weight:500;flex:1;line-height:1.5;}
.task-title.done{text-decoration:line-through;color:var(--text3);}
.task-meta{font-size:11px;color:var(--text3);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
.task-prio{font-size:10px;font-weight:600;padding:2px 7px;border-radius:20px;}
.task-del{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;flex-shrink:0;transition:all .12s;}
.task-del:hover{background:var(--red-bg);color:var(--red);}
.task-detail{display:none;padding:12px 15px 13px 49px;border-top:1px solid var(--border);background:var(--bg2);font-size:13px;color:var(--text2);line-height:1.6;}
.task-detail.open{display:block;}
.task-actions{display:flex;gap:8px;margin-top:10px;}
/* TEAM */
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;margin-bottom:20px;}
.team-card{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 17px;cursor:pointer;transition:all .15s;}
.team-card:hover{border-color:var(--purple);}
.tc-hdr{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.tc-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:10px;}
.tc-kpi{background:var(--bg2);border-radius:var(--r-sm);padding:8px 10px;text-align:center;}
.tc-kpi-val{font-size:15px;font-weight:600;}
.tc-kpi-label{font-size:10px;color:var(--text3);margin-top:1px;}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.bar-label{font-size:11px;color:var(--text2);width:100px;flex-shrink:0;}
.bar-track{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.bar-val{font-size:11px;color:var(--text2);width:30px;text-align:right;}
.phase-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;}
/* SETTINGS */
.set-row{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 15px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
.set-icon{width:34px;height:34px;border-radius:var(--r-sm);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;}
.connected{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--teal-bg);color:var(--teal-dark);}
.disconnected{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px;background:var(--bg3);color:var(--text3);}
/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal-ov.hidden{display:none;}
.modal{background:var(--bg);border-radius:var(--r-lg);padding:24px;width:480px;max-width:95vw;max-height:85vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-actions{display:flex;gap:10px;margin-top:6px;}
/* CHART */
.chart-wrap{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:16px;margin-bottom:14px;}
.chart-toggle{display:flex;border:1px solid var(--border2);border-radius:var(--r-md);overflow:hidden;}
.chart-toggle button{padding:6px 13px;font-size:12px;font-weight:500;border:none;background:transparent;color:var(--text2);cursor:pointer;font-family:inherit;}
.chart-toggle button.active{background:var(--purple);color:#fff;}
.empty{text-align:center;padding:3rem 1rem;color:var(--text2);}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-header">
    <div class="sb-logo"><div class="sb-dot"></div><span class="sb-title">Coaching Dashboard</span></div>
    <div class="sb-sub">Wiegand &amp; Partner</div>
  </div>
  <div class="sb-nav">
    <div class="sb-item" id="nav-team" onclick="showView('team')"><i class="ti ti-layout-grid"></i> Team Overview</div>
    <div class="sb-item" id="nav-settings" onclick="showView('settings')"><i class="ti ti-settings"></i> Settings</div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section">Staff</div>
  <div class="emp-list" id="empList"></div>
  <button class="sb-add" onclick="openModal('addEmpModal')"><i class="ti ti-plus"></i> Add staff member</button>
</div>
<div class="main" id="mainArea"></div>

<!-- MODALS -->
<div class="modal-ov hidden" id="addEmpModal"><div class="modal">
  <div class="modal-title">Add Staff Member</div>
  <div class="f2"><div><label>Full name</label><input type="text" id="newName" placeholder="Anna Bauer"></div><div><label>Role</label><input type="text" id="newRole" placeholder="Inside Sales"></div></div>
  <div class="f2"><div><label>Phase</label><select id="newPhase"><option>Onboarding</option><option>Active</option><option>Development</option></select></div><div><label>Start date</label><input type="date" id="newStart"></div></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('addEmpModal')">Cancel</button><button class="btn btn-primary" onclick="saveNewEmp()"><i class="ti ti-check"></i> Add</button></div>
</div></div>

<div class="modal-ov hidden" id="addTaskModal"><div class="modal">
  <div class="modal-title">Add Task</div>
  <div style="margin-bottom:10px"><label>Task title</label><input type="text" id="taskText" placeholder="e.g. Read the pitch script – pages 1 to 9"></div>
  <div style="margin-bottom:10px"><label>Description</label><textarea id="taskDesc" placeholder="Describe what the staff member needs to do..." style="min-height:80px"></textarea></div>
  <div class="f3"><div><label>Priority</label><select id="taskPrio"><option value="high">High</option><option value="medium" selected>Medium</option><option value="low">Low</option></select></div><div><label>Due date</label><input type="date" id="taskDue"></div><div><label>Source</label><input type="text" id="taskSource" placeholder="Session 10.06"></div></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('addTaskModal')">Cancel</button><button class="btn btn-primary" onclick="saveNewTask()"><i class="ti ti-check"></i> Add Task</button></div>
</div></div>

<div class="modal-ov hidden" id="obModal"><div class="modal">
  <div class="modal-title">Add Onboarding Step</div>
  <div style="margin-bottom:10px"><label>Step name</label><input type="text" id="obLabelInput" placeholder="e.g. Advanced Product Training"></div>
  <div class="f2"><div><label>Day</label><input type="number" id="obDayInput" placeholder="1" min="1" value="1"></div><div><label>Video URL (FTP or https://)</label><input type="url" id="obVideoInput" placeholder="https://..."></div></div>
  <div style="margin-bottom:14px"><label>Description for staff</label><textarea id="obDetailInput" placeholder="Explain what this step covers..."></textarea></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('obModal')">Cancel</button><button class="btn btn-primary" onclick="saveOBStep()"><i class="ti ti-check"></i> Add Step</button></div>
</div></div>

<div class="modal-ov hidden" id="ratingModal"><div class="modal">
  <div class="modal-title">Add Rating Criterion</div>
  <div style="margin-bottom:10px"><label>Name</label><input type="text" id="rcName" placeholder="e.g. Customer Empathy"></div>
  <div class="f3"><div><label>Category</label><select id="rcCat"><option>Sales</option><option>Communication</option><option>Product Knowledge</option><option>Other</option></select></div><div><label>Target (%)</label><input type="number" id="rcTarget" value="80" min="0" max="100"></div><div></div></div>
  <div style="margin-bottom:14px"><label>Description</label><textarea id="rcDesc" placeholder="What does this criterion measure..."></textarea></div>
  <div class="modal-actions"><button class="btn" onclick="closeModal('ratingModal')">Cancel</button><button class="btn btn-primary" onclick="saveRatingCriterion()"><i class="ti ti-check"></i> Add</button></div>
</div></div>

<div class="modal-ov hidden" id="srModal"><div class="modal">
  <div class="modal-title">Connect SolidRoad</div>
  <div style="margin-bottom:10px"><label>API Key</label><input type="password" id="srKeyInput" placeholder="sr_live_..."></div>
  <div style="margin-bottom:14px"><label>Organization ID</label><input type="text" id="srOrgInput" placeholder="Your SolidRoad org ID"></div>
  <p style="font-size:13px;color:var(--text2);margin-bottom:16px;line-height:1.6">Find your API key in SolidRoad → Settings → Integrations → API Keys.</p>
  <div class="modal-actions"><button class="btn" onclick="closeModal('srModal')">Cancel</button><button class="btn btn-primary" onclick="saveSRKey()"><i class="ti ti-plug"></i> Connect</button></div>
</div></div>
<script src="data.js"></script>
<script src="helpers.js"></script>
<script src="render.js"></script>
<script src="actions.js"></script>
</body>
</html>
