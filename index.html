<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Coaching – Wiegand &amp; Partner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
<style>
:root{
  --bg:#fff;--bg2:#f7f7f5;--bg3:#f0efec;
  --text:#1a1a18;--text2:#6b6b67;--text3:#9a9a96;
  --border:rgba(0,0,0,.1);--border2:rgba(0,0,0,.18);
  --purple:#534AB7;--purple-bg:#EEEDFE;--purple-dark:#3C3489;
  --teal:#1D9E75;--teal-bg:#E1F5EE;--teal-dark:#085041;
  --amber:#BA7517;--amber-bg:#FAEEDA;--amber-dark:#633806;
  --blue:#378ADD;--blue-bg:#E6F1FB;--blue-dark:#0C447C;
  --red:#E24B4A;--red-bg:#FCEBEB;
  --r-sm:6px;--r-md:8px;--r-lg:12px;
  --sidebar:250px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Inter',sans-serif;background:var(--bg3);color:var(--text);font-size:14px;line-height:1.5;display:flex;}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--bg);border-right:1px solid var(--border);display:flex;flex-direction:column;height:100vh;flex-shrink:0;}
.sb-kopf{padding:16px 16px 12px;border-bottom:1px solid var(--border);}
.sb-logo{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.sb-punkt{width:8px;height:8px;border-radius:50%;background:var(--purple);}
.sb-titel{font-size:14px;font-weight:600;}
.sb-unter{font-size:11px;color:var(--text2);padding-left:16px;}
.sb-nav{padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 16px;cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);border-left:3px solid transparent;transition:all .12s;}
.sb-item:hover{background:var(--bg2);color:var(--text);}
.sb-item.aktiv{background:var(--bg2);color:var(--purple);border-left-color:var(--purple);}
.sb-item i{font-size:16px;}
.sb-abschnitt{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);padding:8px 16px 4px;}
.ma-liste{flex:1;overflow-y:auto;}
.ma-item{display:flex;align-items:center;gap:9px;padding:8px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .12s;}
.ma-item:hover{background:var(--bg2);}
.ma-item.aktiv{background:var(--bg2);border-left-color:var(--purple);}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0;}
.ma-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ma-rolle{font-size:11px;color:var(--text2);}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px;}
.sb-hinzu{margin:6px 12px 10px;padding:7px 12px;border:1px dashed var(--border2);border-radius:var(--r-md);background:transparent;color:var(--text2);font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .12s;width:calc(100% - 24px);font-family:inherit;}
.sb-hinzu:hover{color:var(--text);border-color:var(--purple);}

/* MAIN */
.hauptbereich-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#hauptbereich{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.topbar{background:var(--bg);border-bottom:1px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tb-links{display:flex;align-items:center;gap:14px;}
.tb-name{font-size:16px;font-weight:600;}
.tb-meta{font-size:12px;color:var(--text2);margin-top:1px;}
.btn{padding:7px 13px;font-size:13px;font-weight:500;border-radius:var(--r-md);cursor:pointer;border:1px solid var(--border2);background:var(--bg);color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:all .12s;font-family:inherit;}
.btn:hover{background:var(--bg2);}
.btn-primary{background:var(--purple);color:#fff;border-color:var(--purple);}
.btn-primary:hover{background:var(--purple-dark);}
.btn-sm{padding:5px 10px;font-size:12px;}

/* TABS */
.tab-bar{background:var(--bg);border-bottom:1px solid var(--border);padding:0 24px;display:flex;flex-shrink:0;overflow-x:auto;}
.tab-bar::-webkit-scrollbar{height:0;}
.tab{padding:10px 15px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:2px solid transparent;color:var(--text2);transition:all .12s;white-space:nowrap;}
.tab.aktiv{color:var(--purple);border-bottom-color:var(--purple);}
.tab:hover:not(.aktiv){color:var(--text);}

/* INHALT */
.inhalt{flex:1;overflow-y:auto;padding:22px 24px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

/* KARTEN */
.karte{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:15px 17px;margin-bottom:14px;}
.abschnitt-titel{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:11px;}
.kpi{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:13px 15px;border-top:3px solid transparent;}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:5px;}
.kpi-val{font-size:22px;font-weight:600;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px;}

/* SESSION KARTEN */
.session-karte{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-lg);padding:14px 16px;margin-bottom:10px;transition:all .15s;cursor:pointer;}
.session-karte:hover{border-color:var(--border2);}
.session-karte.heute{border-left:3px solid var(--purple);background:var(--purple-bg);}

/* ALERTS */
.alert{border-radius:var(--r-lg);padding:14px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;}
.alert-rot{background:var(--red-bg);border:1px solid rgba(226,75,74,.2);}
.alert-gelb{background:var(--amber-bg);border:1px solid rgba(186,117,23,.2);}
.alert-gruen{background:var(--teal-bg);border:1px solid rgba(29,158,117,.2);}

/* TABELLEN */
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:var(--bg2);padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);white-space:nowrap;}
td{padding:10px 14px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}

/* FORMULARE */
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.f3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:10px;}
input,select,textarea{font-size:13px;padding:8px 11px;border-radius:var(--r-md);border:1px solid var(--border2);background:var(--bg2);color:var(--text);font-family:inherit;width:100%;outline:none;transition:border-color .12s;}
input:focus,select:focus,textarea:focus{border-color:var(--purple);}
textarea{resize:vertical;min-height:70px;line-height:1.5;}
label{font-size:12px;font-weight:500;color:var(--text2);display:block;margin-bottom:4px;}

/* MODAL */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;}
.modal-ov.hidden{display:none;}
.modal{background:var(--bg);border-radius:var(--r-lg);padding:24px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;}
.modal-titel{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal-aktionen{display:flex;gap:10px;margin-top:16px;}

/* SCORECARD MODAL */
#scorecardModal .modal{width:760px;}

.leer{text-align:center;padding:3rem 1rem;color:var(--text2);}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-kopf">
    <div class="sb-logo"><div class="sb-punkt"></div><span class="sb-titel">Coaching Dashboard</span></div>
    <div class="sb-unter">Wiegand &amp; Partner</div>
  </div>
  <div class="sb-nav">
    <div class="sb-item aktiv" id="nav-sfp-overview" onclick="zeigeAnsicht('sfp-overview')"><i class="ti ti-layout-grid"></i> SFP Overview</div>
    <div class="sb-item" id="nav-coach" onclick="zeigeAnsicht('coach')"><i class="ti ti-calendar-event"></i> SFP Coaching</div>
  </div>
  <div class="sb-abschnitt">Mitarbeiter</div>
  <div class="ma-liste" id="mitarbeiterListe"></div>
  <button class="sb-hinzu" onclick="openModal('neuerMitarbeiterModal')"><i class="ti ti-plus"></i> Mitarbeiter hinzufügen</button>
</div>

<div class="hauptbereich-wrap">
  <div id="hauptbereich"></div>
</div>

<!-- SESSION PLANEN MODAL -->
<div class="modal-ov hidden" id="neueSessionModal"><div class="modal">
  <div class="modal-titel"><i class="ti ti-calendar-plus" style="margin-right:8px;color:var(--purple)"></i>Session planen</div>
  <div class="f2">
    <div><label>Mitarbeiter</label><select id="ns-mitarbeiter"></select></div>
    <div><label>Datum</label><input type="date" id="ns-datum"></div>
  </div>
  <div class="f2">
    <div><label>Typ</label><select id="ns-typ">
      <option>Onboarding-Session</option>
      <option>Gesprächsbewertung</option>
      <option>Anlassbezogene Session</option>
      <option>Mindset-Coaching</option>
      <option>Einwandbehandlung Training</option>
      <option>Abschlusstechnik Training</option>
    </select></div>
    <div><label>Thema / Fokus</label><input type="text" id="ns-thema" placeholder="z.B. Einwandbehandlung, Loop-Technik..."></div>
  </div>
  <div style="margin-bottom:14px"><label>Anlass / Notiz für den Coach</label><textarea id="ns-notiz" placeholder="Warum wird diese Session eingeplant? Was soll der Coach besonders beachten..."></textarea></div>
  <div class="modal-aktionen">
    <button class="btn" onclick="closeModal('neueSessionModal')">Abbrechen</button>
    <button class="btn btn-primary" onclick="neueSessionAnlegen()"><i class="ti ti-check"></i> Session planen</button>
  </div>
</div></div>

<!-- SCORECARD / SESSION BEWERTEN MODAL -->
<div class="modal-ov hidden" id="scorecardModal"><div class="modal" style="width:760px">
  <div class="modal-titel"><i class="ti ti-clipboard-check" style="margin-right:8px;color:var(--purple)"></i>Session bewerten</div>
  <div id="scorecardInhalt"></div>
  <div class="modal-aktionen">
    <button class="btn" onclick="closeModal('scorecardModal')">Abbrechen</button>
    <button class="btn btn-primary" onclick="sessionSpeichern()"><i class="ti ti-check"></i> Session speichern</button>
  </div>
</div></div>

<!-- AUFGABE HINZUFÜGEN MODAL -->
<div class="modal-ov hidden" id="neueAufgabeModal"><div class="modal">
  <div class="modal-titel"><i class="ti ti-checkbox" style="margin-right:8px;color:var(--purple)"></i>Aufgabe hinzufügen</div>
  <div style="margin-bottom:10px"><label>Aufgabentitel</label><input type="text" id="na-text" placeholder="z.B. SolidRoad Simulation wiederholen"></div>
  <div style="margin-bottom:10px"><label>Beschreibung</label><textarea id="na-beschr" placeholder="Was genau soll der Mitarbeiter tun..."></textarea></div>
  <div class="f3">
    <div><label>Priorität</label><select id="na-prio"><option value="hoch">Hoch</option><option value="mittel" selected>Mittel</option><option value="niedrig">Niedrig</option></select></div>
    <div><label>Fällig am</label><input type="date" id="na-faellig"></div>
    <div><label>Quelle</label><input type="text" id="na-quelle" placeholder="z.B. Session 22.06"></div>
  </div>
  <div class="modal-aktionen">
    <button class="btn" onclick="closeModal('neueAufgabeModal')">Abbrechen</button>
    <button class="btn btn-primary" onclick="neueAufgabeSpeichern()"><i class="ti ti-check"></i> Aufgabe hinzufügen</button>
  </div>
</div></div>

<!-- NEUER MITARBEITER MODAL -->
<div class="modal-ov hidden" id="neuerMitarbeiterModal"><div class="modal">
  <div class="modal-titel">Mitarbeiter hinzufügen</div>
  <div class="f2"><div><label>Vollständiger Name</label><input type="text" id="nm-name" placeholder="Anna Bauer"></div><div><label>Position</label><select id="nm-rolle"><option>Vertriebsmitarbeiter</option><option>Senior Vertriebsmitarbeiter</option><option>Sales Coach</option></select></div></div>
  <div class="f3"><div><label>Phase</label><select id="nm-phase"><option>Onboarding</option><option>Aktiv</option><option>Entwicklung</option></select></div><div><label>Team</label><input type="text" id="nm-team" placeholder="z.B. Deutschland"></div><div><label>Startdatum</label><input type="date" id="nm-start"></div></div>
  <div class="modal-aktionen"><button class="btn" onclick="closeModal('neuerMitarbeiterModal')">Abbrechen</button><button class="btn btn-primary" onclick="neuerMitarbeiterSpeichern()"><i class="ti ti-check"></i> Hinzufügen</button></div>
</div></div>

<script src="data.js"></script>
<script src="helpers.js"></script>
<script src="render.js"></script>
<script src="actions.js"></script>
</body>
</html>
